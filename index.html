<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BIO 1 ADV — Semester 2 Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F6F2;--sf:#FDFCF9;--bd:#E3E0DA;--tx:#1A1918;--mu:#6B6860;--uc:#3B6EA5;--ff:'Jost',sans-serif;--fd:'Cormorant Garamond',Georgia,serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff);background:var(--bg);color:var(--tx);min-height:100vh;font-size:15px;line-height:1.6}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 40px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:var(--fd);font-size:18px;font-weight:600;cursor:pointer;color:var(--tx);letter-spacing:.01em;border:none;background:none}
.logo em{font-style:italic;color:var(--mu);font-weight:400}
.hdr-rt{font-size:13px;color:var(--mu);font-weight:300}
.dash{max-width:1080px;margin:0 auto;padding:52px 40px 80px}
.kicker{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin-bottom:10px}
.dash h1{font-family:var(--fd);font-size:52px;font-weight:600;line-height:1.1;margin-bottom:14px;letter-spacing:-.01em}
.dash-sub{color:var(--mu);font-size:15px;font-weight:300;max-width:500px;line-height:1.7;margin-bottom:40px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:14px;margin-top:40px}
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:48px}
.ucard{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:28px;cursor:pointer;transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.ucard:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.08)}
.ucard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--uc)}
.fcard{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:22px 24px;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;align-items:flex-start;gap:14px}
.fcard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.07);border-color:var(--uc)}
.fcard-icon{font-size:22px;line-height:1;margin-top:2px}
.fcard-title{font-weight:600;font-size:15px;margin-bottom:3px}
.fcard-sub{font-size:12px;color:var(--mu);line-height:1.5}
.card-num{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--uc);margin-bottom:8px}
.card-title{font-family:var(--fd);font-size:24px;font-weight:600;margin-bottom:6px;line-height:1.2}
.card-sub{font-size:13px;color:var(--mu);font-weight:300;margin-bottom:22px;line-height:1.55}
.card-tags{display:flex;gap:8px;flex-wrap:wrap}
.ctag{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--bd);color:var(--mu);background:var(--bg)}
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.prog-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px 16px}
.prog-unit{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);margin-bottom:4px}
.prog-score{font-family:var(--fd);font-size:26px;font-weight:600;line-height:1}
.prog-detail{font-size:12px;color:var(--mu);margin-top:3px}
.prog-bar{height:4px;border-radius:2px;background:var(--bd);margin-top:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.upage{display:flex;max-width:1080px;margin:0 auto;padding:0 40px 80px;gap:36px}
.sidebar{width:210px;flex-shrink:0;padding-top:32px;position:sticky;top:70px;height:fit-content}
.sb-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mu);cursor:pointer;margin-bottom:22px;background:none;border:none;font-family:var(--ff);padding:0;transition:color .1s}
.sb-back:hover{color:var(--tx)}
.sb-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--uc);margin-bottom:4px}
.sb-title{font-family:var(--fd);font-size:17px;font-weight:600;line-height:1.3;margin-bottom:20px}
.sb-nav{display:flex;flex-direction:column;gap:3px}
.sb-tab{padding:9px 13px;border-radius:8px;font-size:14px;cursor:pointer;color:var(--mu);background:none;border:none;font-family:var(--ff);text-align:left;transition:all .12s;font-weight:400}
.sb-tab:hover{background:var(--bd);color:var(--tx)}
.sb-tab.act{background:var(--uc);color:#fff;font-weight:500}
.content{flex:1;min-width:0;padding-top:32px}
.gsec{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:26px 30px;margin-bottom:14px}
.gsec h3{font-family:var(--fd);font-size:21px;font-weight:600;margin-bottom:12px}
.gsec p{font-size:14px;color:#404040;line-height:1.75;margin-bottom:10px}
.gbullets{list-style:none;display:flex;flex-direction:column;gap:7px;margin-top:6px}
.gbullets li{font-size:14px;padding-left:16px;position:relative;line-height:1.6;color:#333}
.gbullets li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--uc)}
.gh4{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--uc);margin-top:14px;margin-bottom:6px}
.gtable{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.gtable th{background:var(--bg);padding:9px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);border-bottom:2px solid var(--bd)}
.gtable td{padding:10px 14px;border-bottom:1px solid var(--bd);line-height:1.5}
.gtable tr:last-child td{border-bottom:none}
.gtable tr:nth-child(even) td{background:#FAFAF8}
.toverflow{overflow-x:auto;margin-top:14px}
.prac-hdr{margin-bottom:24px}
.prac-hdr h2{font-family:var(--fd);font-size:28px;font-weight:600;margin-bottom:4px}
.prac-hdr p{font-size:13px;color:var(--mu)}
.pq{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:22px 24px;margin-bottom:12px}
.pq-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pq-n{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--uc)}
.pq-badge{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--bd);color:var(--mu);text-transform:uppercase;letter-spacing:.04em}
.pq-q{font-size:15px;font-weight:500;margin-bottom:14px;line-height:1.55}
.pq-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.pq-opt{padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--tx);font-family:var(--ff);text-align:left;transition:all .1s;width:100%}
.pq-opt:hover:not(:disabled){border-color:var(--uc)}
.pq-opt.ok{background:#E8F5EE;border-color:#3D8C5A;color:#1F5C38}
.pq-opt.no{background:#FAE8E8;border-color:#C45252;color:#7A2020}
.pq-opt:disabled{cursor:default}
.pq-tfs{display:flex;gap:8px;margin-bottom:10px}
.pq-tf{padding:8px 20px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;cursor:pointer;background:var(--bg);font-family:var(--ff);font-weight:500;transition:all .1s;color:var(--tx)}
.pq-tf:hover:not(:disabled){border-color:var(--uc)}
.pq-tf.ok{background:#E8F5EE;border-color:#3D8C5A;color:#1F5C38}
.pq-tf.no{background:#FAE8E8;border-color:#C45252;color:#7A2020}
.pq-tf:disabled{cursor:default}
.pq-rev{padding:8px 16px;background:var(--uc);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--ff)}
.pq-rev:hover{opacity:.85}
.expl{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:11px 14px;font-size:13px;line-height:1.65;margin-top:8px;display:none;color:#444}
.expl.show{display:block}
.sa-ans{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;font-size:13.5px;line-height:1.65;margin-top:8px;display:none}
.sa-ans.show{display:block}
.sa-ans strong{color:var(--uc)}
.test-wrap{max-width:700px;margin:0 auto;padding:44px 40px 80px}
.test-start{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:44px;text-align:center}
.test-start h2{font-family:var(--fd);font-size:32px;font-weight:600;margin-bottom:10px}
.test-start p{font-size:14px;color:var(--mu);margin-bottom:28px;line-height:1.65;max-width:400px;margin-left:auto;margin-right:auto}
.ti-grid{display:flex;gap:20px;justify-content:center;margin-bottom:32px}
.ti{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:14px 22px;min-width:90px;text-align:center}
.ti-val{font-family:var(--fd);font-size:32px;font-weight:600;color:var(--uc);line-height:1;margin-bottom:4px}
.ti-lbl{font-size:12px;color:var(--mu)}
.test-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.test-title{font-family:var(--fd);font-size:22px;font-weight:600}
.timer{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--uc);background:var(--sf);border:1px solid var(--bd);padding:7px 16px;border-radius:8px;letter-spacing:.03em}
.timer.red{color:#C45252;border-color:#C45252}
.tprog{height:3px;background:var(--bd);border-radius:2px;margin-bottom:32px;overflow:hidden}
.tprog-bar{height:100%;background:var(--uc);border-radius:2px;transition:width .3s}
.t-ubadge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--bd);color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;background:var(--bg)}
.t-counter{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:8px}
.t-q{font-size:18px;font-weight:500;margin-bottom:24px;line-height:1.5}
.t-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.t-opt{padding:14px 18px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;cursor:pointer;background:var(--sf);color:var(--tx);font-family:var(--ff);text-align:left;transition:all .12s}
.t-opt:hover:not(.sel){border-color:var(--uc)}
.t-opt.sel{border-color:var(--uc);background:#EEF4FF;font-weight:500}
.t-nav{display:flex;align-items:center;justify-content:space-between;gap:12px}
.q-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:300px}
.q-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .1s;padding:0}
.q-dot.has{background:var(--uc);border-color:var(--uc)}
.q-dot.cur{border-color:var(--uc);background:white;box-shadow:0 0 0 3px rgba(59,110,165,.2)}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:var(--ff);transition:all .12s;white-space:nowrap}
.btn-p{background:var(--uc);color:white}
.btn-p:hover{opacity:.85}
.btn-s{background:var(--sf);color:var(--tx);border:1.5px solid var(--bd)}
.btn-s:hover{border-color:var(--tx)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.res-top{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:44px;text-align:center;margin-bottom:24px}
.res-score{font-family:var(--fd);font-size:80px;font-weight:600;color:var(--uc);line-height:1;margin-bottom:4px}
.res-frac{font-size:20px;color:var(--mu);margin-bottom:14px}
.res-grade{font-family:var(--fd);font-size:26px;font-weight:600;margin-bottom:4px}
.res-msg{font-size:14px;color:var(--mu)}
.res-btns{display:flex;gap:12px;justify-content:center;margin-top:28px}
.rbk{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.rbk-hdr{padding:12px 20px;border-bottom:2px solid var(--bd);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);background:var(--bg);display:grid;grid-template-columns:28px 1fr 80px;gap:12px}
.rbk-row{padding:14px 20px;border-bottom:1px solid var(--bd);display:grid;grid-template-columns:28px 1fr 80px;gap:12px;align-items:start;font-size:13.5px}
.rbk-row:last-child{border-bottom:none}
.rbk-n{color:var(--mu);font-weight:600;padding-top:1px}
.rbk-q{line-height:1.55}
.rbk-ca{font-size:12px;color:var(--mu);margin-top:3px}
.rbk-ok{color:#3D8C5A;font-weight:600;font-size:13px;text-align:right}
.rbk-no{color:#C45252;font-weight:600;font-size:13px;text-align:right}
.res-breakdown{margin-top:24px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:24px}
.res-bd-title{padding:14px 20px;border-bottom:1px solid var(--bd);font-weight:600;font-size:14px;background:var(--bg)}
.res-bd-row{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--bd);font-size:13.5px}
.res-bd-row:last-child{border-bottom:none}
.res-bd-warn{font-size:11px;color:#C45252;margin-left:6px}
.fc-wrap{max-width:680px;margin:0 auto;padding:44px 40px 80px}
.fc-hdr h2{font-family:var(--fd);font-size:32px;font-weight:600;margin-bottom:6px}
.fc-hdr p{font-size:13px;color:var(--mu)}
.fc-unit-sel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.fc-unit-btn{padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid var(--bd);background:var(--bg);color:var(--mu);font-family:var(--ff);transition:all .12s}
.fc-unit-btn:hover{border-color:var(--uc)}
.fc-unit-btn.act{background:var(--uc);color:white;border-color:var(--uc)}
.fc-progress{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.fc-count{font-size:13px;color:var(--mu)}
.fc-stats{display:flex;gap:12px;font-size:12px}
.fc-k{color:#3D8C5A;font-weight:600}
.fc-u{color:#C45252;font-weight:600}
.fc-scene{perspective:1200px;height:250px;margin-bottom:20px;cursor:pointer}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px;text-align:center;border:1px solid var(--bd)}
.fc-front{background:var(--sf)}
.fc-back{background:#EEF4FF;border-color:#C5D8F0;transform:rotateY(180deg)}
.fc-face-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:12px;position:absolute;top:16px}
.fc-q{font-family:var(--fd);font-size:26px;font-weight:600;line-height:1.3}
.fc-a{font-size:14px;line-height:1.75;color:#333;text-align:left;width:100%}
.fc-hint{font-size:12px;color:var(--mu);text-align:center;margin-bottom:12px}
.fc-actions{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.fc-btn-k{padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #3D8C5A;background:#E8F5EE;color:#1F5C38;font-family:var(--ff)}
.fc-btn-u{padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #C45252;background:#FAE8E8;color:#7A2020;font-family:var(--ff)}
.fc-btn-k:hover{background:#D4EDDA}
.fc-btn-u:hover{background:#F5D0D0}
.fc-nav-row{display:flex;align-items:center;justify-content:space-between}
.fc-pbar{height:3px;background:var(--bd);border-radius:2px;margin-bottom:20px;overflow:hidden}
.fc-pfill{height:100%;border-radius:2px;background:var(--uc);transition:width .3s}
.fc-done{text-align:center;padding:60px 40px;background:var(--sf);border:1px solid var(--bd);border-radius:16px}
.fc-done h3{font-family:var(--fd);font-size:28px;font-weight:600;margin-bottom:8px}
.fc-done p{color:var(--mu);font-size:14px;margin-bottom:24px}
.diag-wrap{max-width:820px;margin:0 auto;padding:44px 40px 80px}
.diag-hdr h2{font-family:var(--fd);font-size:32px;font-weight:600;margin-bottom:6px}
.diag-hdr p{font-size:13px;color:var(--mu)}
.diag-tabs{display:flex;gap:8px;margin-bottom:24px}
.diag-tab{padding:8px 18px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid var(--bd);background:var(--bg);color:var(--mu);font-family:var(--ff)}
.diag-tab.act{background:var(--uc);color:white;border-color:var(--uc)}
.diag-canvas{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:20px}
.diag-canvas svg{width:100%;height:auto;display:block}
.word-bank-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:10px}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.wb-btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);font-family:var(--ff);transition:all .12s}
.wb-btn:hover{border-color:var(--uc)}
.wb-btn.sel{border-color:#E67E22;background:#FDF0E0}
.wb-btn.used{opacity:.35;cursor:default;text-decoration:line-through}
.diag-score{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.diag-score-n{font-family:var(--fd);font-size:28px;font-weight:600;color:var(--uc)}
.diag-score-lbl{font-size:13px;color:var(--mu)}
.diag-instr{font-size:13px;color:var(--mu);margin-bottom:16px;padding:10px 14px;background:var(--bg);border-radius:8px;line-height:1.6}
.hotspot-circle{cursor:pointer;transition:fill .15s}
.hotspot-text{font-size:11px;font-weight:700;fill:white;text-anchor:middle;dominant-baseline:central;pointer-events:none;user-select:none}
.wr-wrap{max-width:760px;margin:0 auto;padding:44px 40px 80px}
.wr-hdr h2{font-family:var(--fd);font-size:32px;font-weight:600;margin-bottom:6px}
.wr-hdr p{font-size:13px;color:var(--mu);margin-bottom:24px}
.wr-unit-sel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.wr-unit-btn{padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid var(--bd);background:var(--bg);color:var(--mu);font-family:var(--ff);transition:all .12s}
.wr-unit-btn:hover{border-color:var(--uc)}
.wr-unit-btn.act{background:var(--uc);color:white;border-color:var(--uc)}
.wr-q{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:26px 28px;margin-bottom:16px}
.wr-qnum{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--uc);margin-bottom:8px}
.wr-qtext{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:14px}
.wr-textarea{width:100%;min-height:110px;padding:12px 14px;border:1.5px solid var(--bd);border-radius:8px;font-family:var(--ff);font-size:14px;line-height:1.65;background:var(--bg);color:var(--tx);resize:vertical;transition:border-color .12s}
.wr-textarea:focus{outline:none;border-color:var(--uc)}
.wr-textarea:disabled{opacity:.6;cursor:default}
.wr-actions{display:flex;gap:10px;margin-top:10px;align-items:center}
.grade-box{margin-top:14px;border-radius:10px;padding:16px 18px;font-size:13.5px;line-height:1.7;border:1px solid}
.grade-box.s3{background:#E8F5EE;border-color:#3D8C5A}
.grade-box.s2{background:#EEF4FF;border-color:#3B6EA5}
.grade-box.s1{background:#FFF8EE;border-color:#C4883E}
.grade-box.s0{background:#FAE8E8;border-color:#C45252}
.grade-box.serr{background:var(--bg);border-color:var(--bd)}
.grade-score{font-family:var(--fd);font-size:22px;font-weight:600;margin-bottom:6px}
.grade-feedback{margin-bottom:6px}

{id:1,title:"Cells",subtitle:"Cell theory, organelles, osmosis & microscopy",color:"#3B6EA5",objs:22,
guide:[
{title:"Why Are Cells Small?",parts:[
{t:'p',s:"Cells must stay small to maintain a high surface area to volume (SA:V) ratio. As a cell grows larger, its volume increases much faster than its surface area."},
{t:'ul',items:["Surface area controls how much material can enter or exit the cell","Volume determines the metabolic demands","As cell size doubles, volume increases 8x but SA increases only 4x","SA formula for cube: SA = 6s\u00b2, V = s\u00b3, Ratio = SA\u00f7V"]},
{t:'tbl',headers:["Cube Side","Surface Area","Volume","SA:V Ratio"],rows:[["1 cm","6 cm\u00b2","1 cm\u00b3","6:1"],["2 cm","24 cm\u00b2","8 cm\u00b3","3:1"],["3 cm","54 cm\u00b2","27 cm\u00b3","2:1"]]}
]},
{title:"Cell Theory and History",parts:[
{t:'ul',items:["1. All living things are made of one or more cells","2. The cell is the basic unit of structure and organization","3. All cells come from pre-existing cells"]},
{t:'h4',s:"Key Scientists"},
{t:'ul',items:["Robert Hooke (1665): named cells after observing cork","Antonie van Leeuwenhoek: first to observe living microorganisms","Matthias Schleiden (1838): all plants made of cells","Theodor Schwann (1839): all animals made of cells","Rudolf Virchow (1855): all cells from pre-existing cells"]}
]},
{title:"Cell Organelles and Functions",parts:[
{t:'tbl',headers:["Organelle","Function","Found In"],rows:[
["Cell membrane","Controls what enters and leaves","All cells"],["Cytoplasm","Area between membrane and nucleus","All cells"],
["Nucleus","Controls all cell activities","Eukaryotes"],["Mitochondria","Produces ATP via cellular respiration","Eukaryotes"],
["Ribosomes","Makes proteins","All cells"],["Golgi apparatus","Packages and ships chemicals","Eukaryotes"],
["Endoplasmic reticulum","Transport; rough ER has ribosomes","Eukaryotes"],["Chloroplasts","Site of photosynthesis","Plant cells"],
["Vacuole","Storage; large central vacuole in plants","Eukaryotes"],["Cell wall","Protection and support; cellulose","Plants, bacteria, fungi"]
]}
]},
{title:"Cell Membrane and Osmosis",parts:[
{t:'ul',items:["Phospholipid bilayer: hydrophilic heads face outward, hydrophobic tails inward","Selectively permeable: allows only certain substances through","Osmosis: water moves from HIGH water concentration to LOW water concentration","Hypotonic: fewer solutes than cell \u2192 water enters \u2192 cell swells","Hypertonic: more solutes than cell \u2192 water leaves \u2192 cell shrinks","Isotonic: equal concentration \u2192 no net water movement"]}

{title:"Prokaryotes vs. Eukaryotes",parts:[

{title:"Microscope and Endosymbiosis",parts:[

{t:'ul',items:["Total magnification = eyepiece x objective (e.g. 10x x 40x = 400x)","Endosymbiosis: mitochondria and chloroplasts were once free-living prokaryotes","Evidence: own DNA, own ribosomes, reproduce by binary fission","Earth: 4.6 bya; prokaryotes: 3.5 bya; eukaryotes: 2 bya"]}
]}
],
practice:[
{type:"mc",q:"A cube with sides of 3 cm has a surface area to volume ratio of:",opts:["6:1","3:1","2:1","1:1"],ans:2,expl:"SA = 6\u00d73\u00b2 = 54 cm\u00b2. V = 3\u00b3 = 27 cm\u00b3. Ratio = 54/27 = 2:1."},
{type:"mc",q:"Which scientist named cells after observing cork under a microscope?",opts:["Virchow","Schleiden","Hooke","Leeuwenhoek"],ans:2,expl:"Robert Hooke (1665) observed cork cells and named them 'cells.'"},
{type:"mc",q:"Which organelle produces ATP energy in the cell?",opts:["Nucleus","Ribosome","Chloroplast","Mitochondria"],ans:3,expl:"Mitochondria produce ATP through cellular respiration."},
{type:"mc",q:"10x eyepiece, 40x objective: total magnification?",opts:["50x","400x","4x","140x"],ans:1,expl:"10 \u00d7 40 = 400x."},
{type:"mc",q:"A cell placed in a hypotonic solution will:",opts:["Shrink","Stay the same","Swell and gain water","Lose water"],ans:2,expl:"Hypotonic = more water than cell. Water moves INTO the cell."},
{type:"mc",q:"'Staphylo-' describes bacteria arranged as:",opts:["Chains","Grape-like clusters","Pairs","Spirals"],ans:1,expl:"Staphylo- = grape-like cluster arrangement."},
{type:"tf",q:"Prokaryotic cells have membrane-bound organelles.",ans:false,expl:"FALSE. Only eukaryotic cells have membrane-bound organelles."},
{type:"tf",q:"Plant cells have a cell wall but animal cells do not.",ans:true,expl:"TRUE. Plant cell walls are made of cellulose. Animal cells only have a cell membrane."},
{type:"tf",q:"Osmosis requires energy (active transport) to move water.",ans:false,expl:"FALSE. Osmosis is passive transport. No energy is required."},
{type:"sa",q:"State the three parts of cell theory.",ans:"<strong>1.</strong> All living things are made of one or more cells.<br><strong>2.</strong> The cell is the basic unit of structure and organization.<br><strong>3.</strong> All cells come from pre-existing cells."},
{type:"sa",q:"Explain the difference between a hypotonic and hypertonic solution.",ans:"<strong>Hypotonic:</strong> fewer solutes than the cell. Water enters; cell swells.<br><strong>Hypertonic:</strong> more solutes than the cell. Water leaves; cell shrinks."},
{type:"sa",q:"Explain the endosymbiosis theory and evidence supporting it.",ans:"Proposes that mitochondria and chloroplasts were once free-living prokaryotes. <strong>Evidence:</strong> (1) own DNA, (2) own ribosomes, (3) reproduce by binary fission."}
],
test:[

{q:"Who stated all cells come from pre-existing cells?",opts:["Schleiden","Schwann","Hooke","Virchow"],ans:3},
{q:"Who named cells after observing cork?",opts:["Virchow","Leeuwenhoek","Hooke","Schleiden"],ans:2},

{q:"NOT found in a typical animal cell:",opts:["Cytoplasm","Cell membrane","Cell wall","Golgi apparatus"],ans:2},
{q:"10x eyepiece + 40x objective: magnification?",opts:["50x","400x","4000x","14x"],ans:1},
{q:"Which objective lens gives the LARGEST field of view?",opts:["High power (40x)","Medium power (10x)","Low power (4x)","All equal"],ans:2},
{q:"Egg weighs 75g at 30 min, 62g at 90 min. Solution is:",opts:["Hypotonic","Isotonic","Hypertonic","Distilled water"],ans:2},
{q:"In osmosis, water moves from __ to __ water concentration.",opts:["Low to high","High to low","Stays equal","Depends on temp"],ans:1},
{q:"Egg inside not red. Membrane is:",opts:["Permeable","Impermeable","Selectively permeable","Using active transport"],ans:2},
{q:"Cell with 90% water in 98% water solution will:",opts:["Not change","Gain water","Lose water","Cannot determine"],ans:1},
{q:"Movement from high to low concentration is:",opts:["Osmosis","Active transport","Diffusion","Endocytosis"],ans:2},
{q:"Endosymbiosis says these were once free-living prokaryotes:",opts:["Nucleus and Golgi","Mitochondria and chloroplasts","Ribosomes and vacuoles","ER and nucleus"],ans:1},
{q:"Prokaryotes appeared in fossil record approximately:",opts:["1 bya","2 bya","3.5 bya","4.6 bya"],ans:2},
{q:"Spherical bacteria in grape-like clusters:",opts:["Streptobacilli","Staphylococci","Streptococci","Spirilli"],ans:1},

{id:2,title:"Photosynthesis, Respiration & Carbon Cycle",subtitle:"Energy flow, metabolism, and Earth's carbon pathways",color:"#4A8C6F",objs:13,
guide:[
{title:"Van Helmont's Experiment",parts:[

]},
{title:"Photosynthesis Overview",parts:[
{t:'ul',items:["Overall: 6CO\u2082 + 6H\u2082O + light energy \u2192 C\u2086H\u2081\u2082O\u2086 + 6O\u2082","Location: chloroplasts","Two stages: Light Reactions (thylakoid) and Dark Reactions/Calvin Cycle (stroma)","Water is split during light reactions (photolysis) \u2192 releases O\u2082"]}

]}
]},

{type:"mc",q:"Which stage of cellular respiration produces the MOST ATP?",opts:["Glycolysis","Krebs Cycle","Electron Transport Chain","Fermentation"],ans:2,expl:"ETC produces ~34 ATP (out of ~38 total)."},
{type:"mc",q:"What builds up in muscle cells during intense exercise?",opts:["Pyruvic acid","Acetyl CoA","Lactic acid","NADPH"],ans:2,expl:"Lactic acid fermentation causes lactic acid buildup, leading to muscle fatigue."},
{type:"mc",q:"Van Helmont incorrectly concluded mass came from:",opts:["Soil","Water","Sunlight","Carbon dioxide"],ans:1,expl:"The soil barely changed, so he concluded mass came from water. Most plant mass actually comes from CO\u2082."},
{type:"mc",q:"Which DIRECTLY adds carbon to the atmosphere?",opts:["Photosynthesis and burial","Cellular respiration and combustion","Dissolution and photosynthesis","Burial and dissolution"],ans:1,expl:"Cellular respiration and combustion both release CO\u2082 into the atmosphere."},
{type:"mc",q:"Light reactions occur in the:",opts:["Stroma","Thylakoid membranes","Cytoplasm","Nucleus"],ans:1,expl:"Light reactions (light-dependent stage) occur in the thylakoid membranes."},
{type:"tf",q:"The oxygen released during photosynthesis comes from CO\u2082.",ans:false,expl:"FALSE. O\u2082 comes from splitting WATER molecules (photolysis), not from CO\u2082."},
{type:"tf",q:"Glycolysis is an anaerobic process that occurs in the cytoplasm.",ans:true,expl:"TRUE. Glycolysis occurs in the cytoplasm and does not require oxygen."},
{type:"tf",q:"Dark reactions can only occur in the dark.",ans:false,expl:"FALSE. Dark reactions don't directly need light but can occur in either condition."},
{type:"sa",q:"Compare light reactions and dark reactions (reactants, products, location).",ans:"<strong>Light reactions</strong> (thylakoid): Reactants = sunlight, water. Products = ATP, NADPH, O\u2082.<br><strong>Dark reactions</strong> (stroma): Reactants = CO\u2082, ATP, NADPH. Products = glucose."},
{type:"sa",q:"Compare lactic acid fermentation and alcohol fermentation.",ans:"Both are <strong>anaerobic</strong> and begin with glycolysis.<br><strong>Lactic acid:</strong> muscle cells; lactic acid + 2 ATP.<br><strong>Alcohol:</strong> yeast; ethanol + CO\u2082 + 2 ATP."},

guide:[
{title:"Mitosis vs. Meiosis: Comparison Table",parts:[
{t:'tbl',headers:["Feature","Mitosis","Meiosis"],rows:[
["Purpose","Growth, repair, replacement","Sexual reproduction, genetic diversity"],
["Occurs in","Somatic (body) cells","Reproductive organs (gonads)"],

const FC={
1:[
{f:"Osmosis",b:"Diffusion of WATER across a selectively permeable membrane, from high water concentration to low water concentration. Passive (no energy needed)."},
{f:"Hypotonic solution",b:"FEWER solutes than the cell (more water). Water enters the cell by osmosis. Cell SWELLS."},
{f:"Hypertonic solution",b:"MORE solutes than the cell (less water). Water leaves the cell by osmosis. Cell SHRINKS."},
{f:"Isotonic solution",b:"EQUAL solute concentration to the cell. No net water movement."},
{f:"Cell theory (3 parts)",b:"1) All living things are made of cells.\n2) The cell is the basic unit of life.\n3) All cells come from pre-existing cells."},
{f:"Prokaryote",b:"Cell WITHOUT a membrane-bound nucleus or organelles. DNA floats in cytoplasm. Examples: bacteria, archaea. Appeared ~3.5 bya."},
{f:"Eukaryote",b:"Cell WITH a membrane-bound nucleus and membrane-bound organelles. Examples: plants, animals, fungi, protists. Appeared ~2 bya."},
{f:"Mitochondria",b:"Organelle that produces ATP through cellular respiration. The 'powerhouse' of the cell. Found in all eukaryotes."},
{f:"Chloroplast",b:"Organelle that performs photosynthesis. Contains chlorophyll. Found ONLY in plant cells and algae."},
{f:"Selectively permeable",b:"Property of the cell membrane: allows only CERTAIN substances to pass through. Large or charged molecules are blocked."},
{f:"Phospholipid bilayer",b:"Double-layer structure of the cell membrane. Hydrophilic (water-loving) heads face outward; hydrophobic tails face inward."},
{f:"Endosymbiosis theory",b:"Mitochondria and chloroplasts were once free-living prokaryotes engulfed by larger cells. Evidence: own DNA, own ribosomes, reproduce by binary fission."},
{f:"SA:V ratio (cube)",b:"Surface Area = 6s², Volume = s³. Ratio = SA ÷ V.\nExample: 2 cm cube: SA=24, V=8, ratio = 3:1.\nSmaller cells have HIGHER SA:V ratios."},
{f:"Robert Hooke",b:"Named cells 'cells' in 1665 after observing cork under a microscope."},
{f:"Rudolf Virchow",b:"Stated 'all cells come from pre-existing cells' (1855). Third principle of cell theory."},
{f:"Total magnification",b:"Eyepiece power x Objective lens power.\nExample: 10x eyepiece x 40x objective = 400x total magnification."},
{f:"Staphylo- prefix",b:"Grape-like CLUSTER arrangement of bacteria. Example: Staphylococcus aureus."},
{f:"Strepto- prefix",b:"CHAIN arrangement of bacteria. Example: Streptococcus pyogenes."},
{f:"Gram-positive vs. Gram-negative",b:"Gram+: thick peptidoglycan wall; stains PURPLE; more antibiotic-susceptible.\nGram-: thin wall + outer lipopolysaccharide; stains PINK/RED; more resistant."},
{f:"Diffusion",b:"Movement of molecules from HIGH to LOW concentration. Passive transport (no energy). Continues until equilibrium."}
],
2:[
{f:"Photosynthesis equation",b:"6CO₂ + 6H₂O + light energy → C₆H₁₂O₆ + O₂\nOccurs in CHLOROPLASTS."},
{f:"Cellular respiration equation",b:"C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 38 ATP\nOccurs in MITOCHONDRIA."},
{f:"Light reactions",b:"Occur in THYLAKOID MEMBRANES.\nReactants: sunlight, water, ADP, NADP+.\nProducts: ATP, NADPH, and O₂ (from photolysis of water)."},
{f:"Dark reactions (Calvin Cycle)",b:"Occur in the STROMA.\nReactants: CO₂, ATP, NADPH.\nProducts: glucose, ADP, NADP+ (recycled back to light reactions)."},
{f:"ATP",b:"Adenosine Triphosphate. The cell's primary energy currency.\n3 phosphate groups, 2 high-energy bonds.\nATP → ADP releases energy for cell work."},
{f:"ADP vs AMP",b:"ADP (Adenosine Diphosphate): 2 phosphates, 1 high-energy bond.\nAMP (Adenosine Monophosphate): 1 phosphate, 0 high-energy bonds."},
{f:"Glycolysis",b:"Breakdown of glucose into 2 pyruvic acid molecules.\nOccurs in CYTOPLASM. Anaerobic (no O₂ needed).\nProduces 2 ATP."},
{f:"Krebs Cycle",b:"Aerobic stage in MITOCHONDRIA MATRIX.\nRequires O₂. Products: CO₂, NADH, FADH₂, 2 ATP per glucose."},
{f:"Electron Transport Chain",b:"Final aerobic stage on INNER MITOCHONDRIAL MEMBRANE.\nRequires O₂. Produces ~34 ATP and water.\nMost ATP from aerobic respiration comes here."},
{f:"Lactic acid fermentation",b:"Anaerobic process in muscle cells and bacteria.\nProducts: lactic acid + 2 ATP.\nNo CO₂ produced. Causes muscle fatigue."},
{f:"Alcohol fermentation",b:"Anaerobic process in YEAST.\nProducts: ethanol + CO₂ + 2 ATP.\nUsed in brewing and baking."},
{f:"Chlorophyll",b:"Green pigment inside chloroplasts.\nAbsorbs RED and BLUE light; reflects green.\nDrives the light reactions."},
{f:"Stomata",b:"Small pores on leaf surfaces.\nAllow gas exchange: CO₂ IN, O₂ OUT during photosynthesis.\nOpened/closed by guard cells."},
{f:"Guard cells",b:"Cells that surround each stoma.\nControl opening/closing of stomata.\nClose during drought to prevent water loss."},
{f:"Van Helmont's experiment",b:"Willow tree grew ~74 kg; soil lost only 0.06 kg.\nConcluded (incorrectly) mass came from water.\nMost plant mass actually comes from CO₂."},
{f:"Carbon cycle: adds to atmosphere",b:"Cellular respiration, combustion, and decomposition all release CO₂."},
{f:"Carbon cycle: removes from atmosphere",b:"Photosynthesis removes CO₂ (carbon fixation). Dissolution moves it to hydrosphere."},
{f:"Photolysis",b:"Splitting of water molecules by light during LIGHT REACTIONS.\nReleases O₂ as a byproduct. Source of the O₂ we breathe."},
{f:"Total ATP from aerobic respiration",b:"Glycolysis: 2 ATP.\nKrebs: 2 ATP.\nETC: ~34 ATP.\nTOTAL: ~38 ATP per glucose molecule."},
{f:"Why doesn't O₂ affect photosynthesis?",b:"O₂ is NOT a reactant in photosynthesis. Blocking O₂ from a plant will NOT affect photosynthesis rate. O₂ is only needed for cellular respiration."}
],
3:[
{f:"Mitosis",b:"Cell division producing 2 genetically IDENTICAL diploid cells.\nPurpose: growth, repair, replacement of somatic (body) cells."},
{f:"Meiosis",b:"Cell division producing 4 genetically UNIQUE haploid cells.\nPurpose: sexual reproduction. Occurs in gonads."},
{f:"Diploid (2n)",b:"Cell with TWO complete sets of chromosomes (one from each parent). All normal body cells are diploid."},
{f:"Haploid (n)",b:"Cell with only ONE set of chromosomes.\nGametes (sperm and egg) are haploid. Formed by meiosis."},
{f:"Crossing over",b:"Exchange of DNA segments between HOMOLOGOUS chromosomes during PROPHASE I of meiosis.\nCreates new allele combinations. KEY source of genetic variation."},
{f:"Prophase",b:"Phase 1 of mitosis: chromosomes CONDENSE. Nuclear envelope DISSOLVES. Spindle fibers FORM."},
{f:"Metaphase",b:"Phase 2 of mitosis: chromosomes LINE UP at the cell EQUATOR (metaphase plate)."},
{f:"Anaphase",b:"Phase 3 of mitosis: SISTER CHROMATIDS SEPARATE and move to OPPOSITE POLES."},
{f:"Telophase",b:"Phase 4 of mitosis: nuclear envelope REFORMS. Chromosomes DECONDENSE. Cytokinesis divides cytoplasm."},
{f:"Meiosis I vs. Meiosis II",b:"Meiosis I: separates HOMOLOGOUS CHROMOSOMES (diploid → haploid). Crossing over in Prophase I.\nMeiosis II: separates SISTER CHROMATIDS (like mitosis). No DNA replication between."},
{f:"Why is meiosis genetically diverse?",b:"1. Crossing over in Prophase I exchanges DNA between homologs.\n2. Independent assortment during Metaphase I randomizes chromosome distribution.\nResult: each gamete is genetically unique."},
{f:"DNA replication in meiosis",b:"DNA replicates only ONCE (before Meiosis I) even though there are TWO rounds of division.\nResult: 4 haploid cells from 1 diploid parent cell."},
{f:"Sister chromatids",b:"Two IDENTICAL copies of a chromosome joined at the centromere after DNA replication.\nThey separate during anaphase."},
{f:"Homologous chromosomes",b:"Chromosome PAIRS (one from each parent) carrying genes for the same traits.\nPair up during Meiosis I (not in mitosis)."},
{f:"Interphase",b:"Stage BEFORE cell division. G1: cell grows. S phase: DNA REPLICATES. G2: cell prepares for division."}
],
4:[
{f:"Genotype vs. Phenotype",b:"Genotype: actual GENETIC MAKEUP (BB, Bb, bb).\nPhenotype: physical EXPRESSION of the genotype (e.g. brown eyes)."},
{f:"Homozygous vs. Heterozygous",b:"Homozygous: two IDENTICAL alleles (AA or aa).\nHeterozygous: two DIFFERENT alleles (Aa). Also called carrier or hybrid."},
{f:"Dominant vs. Recessive allele",b:"Dominant: expressed WHENEVER present; capital letter.\nRecessive: only expressed when HOMOZYGOUS (aa); lowercase."},
{f:"Incomplete dominance",b:"NEITHER allele is fully dominant. Heterozygote shows a BLEND.\nExample: red (RR) x white (WW) snapdragon = PINK (RW)."},
{f:"Codominance",b:"BOTH alleles FULLY expressed in heterozygote (no blending).\nExample: blood type AB (both A and B antigens present on RBCs)."},
{f:"Sex-linked (X-linked) trait",b:"Gene on the X chromosome.\nMales (XY): need only ONE recessive allele to show the trait.\nFemales (XX): need TWO copies.\nExamples: colorblindness, hemophilia."},
{f:"Pedigree chart symbols",b:"Circle = female. Square = male.\nFilled/shaded = AFFECTED.\nHalf-filled circle = CARRIER female.\nHorizontal line = mating pair."},
{f:"ABO blood type genotypes",b:"Type A: IᴬIᴬ or Iᴬi.\nType B: IᴮIᴮ or Iᴮi.\nType AB: IᴬIᴮ (codominant).\nType O: ii (homozygous recessive)."},
{f:"Monohybrid cross Aa x Aa",b:"Genotype ratio: 1 AA : 2 Aa : 1 aa.\nPhenotype ratio: 3 dominant : 1 recessive (75%:25%)."},
{f:"Dihybrid cross AaBb x AaBb",b:"4x4 Punnett square (16 boxes).\nPhenotype ratio: 9 A_B_ : 3 A_bb : 3 aaB_ : 1 aabb (9:3:3:1)."},
{f:"Test cross",b:"Crossing organism with UNKNOWN dominant genotype with HOMOZYGOUS RECESSIVE (aa).\nReveals the unknown genotype."},
{f:"Law of segregation",b:"Allele pairs SEPARATE during gamete formation.\nEach gamete receives only ONE allele per gene."},
{f:"Carrier (genetics)",b:"HETEROZYGOUS individual who shows DOMINANT phenotype but carries one recessive allele.\nCan pass the recessive allele to offspring."},
{f:"X-linked colorblindness cross",b:"Colorblind female (X^cX^c) x normal male (X^HY):\nAll sons are colorblind (X^cY).\nAll daughters are carriers (X^HX^c)."},
{f:"Hemophilia carrier cross",b:"Carrier female (X^HX^h) x normal male (X^HY):\n1/2 daughters normal, 1/2 daughters carriers.\n1/2 sons normal, 1/2 sons have hemophilia."}
],

{f:"DNA vs. RNA (3 key differences)",b:"1. Sugar: DNA = DEOXYRIBOSE; RNA = RIBOSE.\n2. Bases: DNA uses THYMINE; RNA uses URACIL.\n3. Strands: DNA = DOUBLE-stranded; RNA = SINGLE-stranded."},
{f:"Three types of RNA",b:"mRNA (messenger): carries genetic code from nucleus to ribosome.\ntRNA (transfer): carries amino acids to ribosome; has anticodon.\nrRNA (ribosomal): structural component of ribosomes."},
{f:"Transcription",b:"DNA → mRNA. Occurs in the NUCLEUS.\nRNA polymerase reads the DNA template strand and builds a complementary mRNA strand."},
{f:"Translation",b:"mRNA → protein. Occurs at RIBOSOMES in the cytoplasm.\nRibosome reads mRNA codons; tRNA delivers amino acids; peptide bonds form a polypeptide."},
{f:"Codon",b:"3 nucleotides on mRNA that code for one specific amino acid.\n64 possible codons (4³ = 64)."},
{f:"Anticodon",b:"3 nucleotides on tRNA complementary to a specific mRNA codon.\nEnsures the correct amino acid is delivered during translation."},
{f:"Start codon (AUG)",b:"The UNIVERSAL start codon. Codes for METHIONINE.\nTranslation always begins at AUG. If mutated, translation cannot start."},
{f:"Stop codons",b:"UAA, UAG, and UGA.\nSignal the END of translation. No amino acid added.\nRibosome releases the completed polypeptide."},
{f:"DNA to mRNA base pairing",b:"DNA A → mRNA U\nDNA T → mRNA A\nDNA G → mRNA C\nDNA C → mRNA G"},
{f:"Germline vs. Somatic mutation",b:"Germline (sperm/egg): CAN be passed to offspring.\nSomatic (body cells): CANNOT be passed to offspring. Only affects that individual."},
{f:"Sickle cell disease",b:"POINT MUTATION in hemoglobin gene. One base change substitutes VALINE for GLUTAMIC ACID.\nHemoglobin misfolds → sickle-shaped RBCs → poor O₂ transport and vessel blockage."},
{f:"Theory of evolution",b:"Evolution = change in heritable traits in a population over time.\nEvidence: fossil record, homologous structures, DNA comparison, biogeography."},
{f:"Darwin's 4 premises",b:"1. Overproduction: more offspring than can survive.\n2. Variation: heritable differences exist.\n3. Heritable variation: differences pass to offspring.\n4. Differential survival: favorable traits = more reproduction."},
{f:"Allopatric vs. Sympatric speciation",b:"Allopatric: geographic BARRIER → independent evolution → reproductive isolation → new species. MORE COMMON.\nSympatric: new species in SAME area. LESS COMMON."},
{f:"5 forces of evolution",b:"1. Mutation: new alleles.\n2. Gene flow: alleles move between populations.\n3. Genetic drift: random changes; strongest in small populations.\n4. Natural selection: differential survival.\n5. Non-random mating."},
{f:"Reproductive isolation",b:"Populations that can no longer INTERBREED.\nRequired for speciation. Without it, gene flow prevents divergence."},
{f:"Frameshift mutation",b:"Caused by INSERTION or DELETION of nucleotides.\nShifts the entire reading frame. Usually more damaging than substitution mutations."},
{f:"DNA replication (overview)",b:"Occurs during S phase of INTERPHASE.\nHelicase unwinds DNA. DNA polymerase adds complementary nucleotides.\nResult: 2 identical DNA double helices (semi-conservative)."},
{f:"Why is sympatric speciation rare?",b:"Without geographic separation, GENE FLOW between subpopulations mixes alleles.\nThis prevents populations from diverging enough to become reproductively isolated."},
{f:"Coding vs. template strand",b:"Template strand: read by RNA polymerase (3' to 5').\nmRNA is complementary to the template.\nCoding strand: same sequence as mRNA (with T instead of U)."}
]
};

const WQ={
1:[
{q:"Explain why cells cannot grow infinitely large. Use the concept of SA:V ratio and describe what happens to the ratio as cell size increases.",ans:"As a cell grows, its volume increases faster than its surface area. This lowers the SA:V ratio, meaning less membrane is available to supply the cell's growing metabolic needs. Nutrients and waste cannot move in and out fast enough, so cells must remain small to maintain an efficient ratio."},
{q:"Compare prokaryotic and eukaryotic cells. Include at least four structural differences.",ans:"Prokaryotes lack a membrane-bound nucleus; eukaryotes have one. Prokaryotes have no membrane-bound organelles; eukaryotes do. Prokaryotic DNA is circular and floats in the cytoplasm; eukaryotic DNA is linear and housed in the nucleus. Prokaryotes appeared earlier (~3.5 bya); eukaryotes appeared ~2 bya. Prokaryotes are generally smaller."},
{q:"Describe the process of osmosis. Define hypotonic, hypertonic, and isotonic solutions and explain what happens to a cell in each.",ans:"Osmosis is the passive movement of water across a selectively permeable membrane from a region of high water concentration to low water concentration. In a hypotonic solution (fewer solutes than the cell), water enters the cell and it swells. In a hypertonic solution (more solutes), water leaves and the cell shrinks. In an isotonic solution (equal solute concentration), there is no net water movement."},
{q:"Explain the endosymbiosis theory. What does it propose, and what three pieces of evidence support it?",ans:"Endosymbiosis theory proposes that mitochondria and chloroplasts were once free-living prokaryotes that were engulfed by larger cells and eventually became permanent organelles. Evidence: (1) both organelles have their own circular DNA, (2) both have their own ribosomes similar to bacterial ribosomes, and (3) both reproduce independently by binary fission."},
{q:"Describe the fluid mosaic model of the cell membrane. What does 'selectively permeable' mean and why is it important?",ans:"The fluid mosaic model describes the cell membrane as a flexible phospholipid bilayer with embedded proteins. Hydrophilic heads face outward and hydrophobic tails face inward. Selectively permeable means only certain molecules can pass through. This is important because it allows the cell to control what enters and exits, maintaining homeostasis and regulating transport of nutrients and waste."}
],
2:[
{q:"Compare the light reactions and dark reactions of photosynthesis. For each stage, state the location, reactants, and products.",ans:"Light reactions occur in the thylakoid membranes. Reactants: sunlight, water, ADP, NADP+. Products: ATP, NADPH, and O2 (from photolysis). Dark reactions (Calvin cycle) occur in the stroma. Reactants: CO2, ATP, NADPH. Products: glucose, and ADP and NADP+ are recycled back to the light reactions."},
{q:"Describe the three stages of aerobic cellular respiration. For each stage, state the location and key products.",ans:"Glycolysis occurs in the cytoplasm. No O2 needed. Products: 2 pyruvic acid, 2 ATP, 2 NADH. The Krebs cycle occurs in the mitochondrial matrix. Requires O2. Products: CO2, NADH, FADH2, 2 ATP. The electron transport chain occurs on the inner mitochondrial membrane. Requires O2. Products: ~34 ATP and water. Total: ~38 ATP per glucose."},
{q:"Compare lactic acid fermentation and alcohol fermentation. Include organism, products, and one similarity.",ans:"Both are anaerobic processes that begin with glycolysis and produce only 2 ATP. Lactic acid fermentation occurs in muscle cells and bacteria, producing lactic acid. Alcohol fermentation occurs in yeast, producing ethanol and CO2."},
{q:"Describe how carbon moves through the carbon cycle. Include the atmosphere, biosphere, and geosphere in your answer.",ans:"Carbon enters the biosphere when plants absorb CO2 through photosynthesis (carbon fixation). It returns to the atmosphere through cellular respiration, combustion, and decomposition. Carbon enters the geosphere when organic matter is buried over millions of years, forming fossil fuels. Burning fossil fuels (combustion) returns it to the atmosphere. Carbon also dissolves into the hydrosphere from the atmosphere."},
{q:"Describe Van Helmont's experiment. What did he conclude, and what do we now know is the correct explanation?",ans:"Van Helmont planted a 2.3 kg willow in 90.9 kg of soil and watered it with rainwater for five years. The tree gained ~74 kg while the soil lost only 0.06 kg. He concluded mass came from water. We now know most plant mass comes from CO2 absorbed from the air via photosynthesis, not from water or soil."}
],
3:[
{q:"Compare mitosis and meiosis. Include purpose, number of divisions, chromosome number in daughter cells, and whether daughter cells are genetically identical.",ans:"Mitosis: purpose is growth and repair; one division; daughter cells are diploid (2n); daughter cells are genetically identical. Meiosis: purpose is sexual reproduction; two divisions; daughter cells are haploid (n); daughter cells are genetically unique due to crossing over and independent assortment."},
{q:"Explain why meiosis produces genetically unique cells. Include two specific mechanisms in your answer.",ans:"Meiosis produces genetic diversity through two mechanisms. First, crossing over during Prophase I exchanges DNA segments between homologous chromosomes, creating new allele combinations. Second, independent assortment during Metaphase I randomly determines which homolog moves to which pole, further randomizing the genetic content of each daughter cell."},
{q:"Describe the four phases of mitosis in order. For each phase, state one key event.",ans:"Prophase: chromosomes condense and the nuclear envelope dissolves; spindle fibers form. Metaphase: chromosomes line up along the cell's equator (metaphase plate). Anaphase: sister chromatids are pulled to opposite poles by spindle fibers. Telophase: the nuclear envelope reforms and chromosomes decondense; cytokinesis divides the cytoplasm into two cells."},
{q:"Explain the difference between Meiosis I and Meiosis II. What does each division accomplish?",ans:"Meiosis I is the reductive division. Homologous chromosome pairs are separated, reducing the cell from diploid (2n) to haploid (n). Crossing over occurs in Prophase I. Meiosis II resembles mitosis: sister chromatids are separated. No additional DNA replication occurs between the two divisions. The result is four haploid cells, all genetically unique."}
],
4:[
{q:"Explain the difference between incomplete dominance and codominance. Give one example of each and describe the heterozygote phenotype.",ans:"Incomplete dominance: neither allele is fully dominant; the heterozygote shows a blend of both traits. Example: red x white snapdragon = pink. Codominance: both alleles are fully and equally expressed in the heterozygote with no blending. Example: blood type AB, where both A and B antigens are present on red blood cells."},
{q:"Explain X-linked inheritance. Why are X-linked recessive traits more common in males than females? Use genotype notation in your answer.",ans:"X-linked traits are encoded on the X chromosome. Males (XY) have only one X chromosome, so a single recessive allele (X^hY) is sufficient to show the trait. Females (XX) need two copies of the recessive allele (X^hX^h) to be affected; one recessive allele makes them a carrier (X^HX^h). Because males cannot be carriers, they express any recessive X-linked allele they carry."},
{q:"A carrier female for hemophilia (X^H X^h) has children with a normal male (X^H Y). Predict all possible offspring genotypes and phenotypes using a Punnett square.",ans:"Offspring: X^H X^H (normal female), X^H X^h (carrier female), X^H Y (normal male), X^h Y (affected male). 1/2 of daughters are carriers and 1/2 are normal; 1/2 of sons have hemophilia and 1/2 are normal. 1/4 of all offspring have hemophilia (all male)."},
{q:"Explain ABO blood type inheritance. Why is blood type AB an example of codominance and blood type O an example of recessive inheritance?",ans:"ABO blood types are controlled by three alleles: I^A, I^B, and i. I^A and I^B are both dominant over i. Blood type AB (genotype I^A I^B) is codominance because both I^A and I^B are fully expressed simultaneously, producing both A and B antigens. Blood type O (genotype ii) is recessive because both alleles must be the recessive i allele for no antigens to be produced."}
],
5:[
{q:"Explain the central dogma of molecular biology. Describe what happens during transcription and translation, including where each occurs.",ans:"The central dogma describes the flow of genetic information: DNA to mRNA to protein. Transcription occurs in the nucleus: RNA polymerase reads the DNA template strand and builds a complementary mRNA strand. Translation occurs at ribosomes in the cytoplasm: the ribosome reads mRNA codons (3-nucleotide sequences); tRNA molecules deliver matching amino acids; peptide bonds link them into a polypeptide (protein)."},
{q:"What is sickle cell disease? Explain its molecular cause from the DNA mutation to the effect on red blood cells.",ans:"Sickle cell disease is a blood disorder caused by a point mutation in the hemoglobin gene. A single base change causes the amino acid glutamic acid to be replaced by valine. This causes hemoglobin molecules to misfold and stick together. Red blood cells become sickle-shaped, reducing their ability to carry oxygen and causing them to block blood vessels."},
{q:"State Darwin's four premises of natural selection and explain how they lead to evolutionary change over generations.",ans:"(1) Overproduction: more offspring are born than can survive. (2) Variation: individuals have heritable differences in traits. (3) Heritable variation: those differences are passed to offspring. (4) Differential survival: individuals with favorable traits survive and reproduce more. Over generations, favorable alleles become more common in the population because their carriers leave more offspring, causing the population to change."},
{q:"Compare allopatric and sympatric speciation. Which is more common, why does it occur, and what is required for any speciation to happen?",ans:"Allopatric speciation occurs when a geographic barrier separates a population. Isolated groups evolve independently and eventually become reproductively isolated, forming new species. It is the more common type. Sympatric speciation occurs within the same geographic area, usually requiring very strong selection pressures. Reproductive isolation is required for any speciation to occur: without it, gene flow between populations prevents them from diverging into separate species."},
{q:"Describe the five forces of evolution. For each force, briefly explain how it changes allele frequencies in a population.",ans:"(1) Mutation: introduces new alleles by changing DNA sequences, creating raw material for evolution. (2) Gene flow: movement of individuals between populations transfers alleles, making populations more similar. (3) Genetic drift: random changes in allele frequency due to chance; strongest in small populations. (4) Natural selection: individuals with favorable traits survive and reproduce more, increasing their alleles over time. (5) Non-random mating (sexual selection): mate choice based on traits shifts allele frequencies toward preferred characteristics."}
]
};

function buildRevealBox(modelAns,uid,qi,score,ctx){
const rubric=[
{cls:'r3',label:'3 &mdash; Complete',desc:'All key concepts present and accurate'},
{cls:'r2',label:'2 &mdash; Mostly correct',desc:'1-2 key points missing or slightly off'},
{cls:'r1',label:'1 &mdash; Partial',desc:'Some understanding but significant gaps'},
{cls:'r0',label:'0 &mdash; Off-topic',desc:'Incorrect or off-topic'}
];
const scoreColors={3:'#3D8C5A',2:'#3B6EA5',1:'#C4883E',0:'#C45252'};
let h='<div class="model-ans"><div class="model-ans-label">Model Answer</div>'+modelAns+'</div>';
if(score===null){
const fn=ctx==='final'?'selfScoreFinal('+qi+',SCORE)':'selfScoreWriting('+uid+','+qi+',SCORE)';
h+='<div class="rubric-row">';
rubric.forEach(r=>{
h+='<button class="rub-btn '+r.cls+'" title="'+r.desc+'" onclick="'+fn.replace('SCORE',r.label[0])+'">'+r.label+'</button>';
});
h+='</div>';
h+='<div style="font-size:11px;color:var(--mu);margin-top:8px">Honestly compare your answer to the model, then pick a score.</div>';
}else{

h+='</div>';
}
return h;
}

function getScoreSummary(){
const summary={};
UNITS.forEach(u=>{
const key='u'+u.id;const arr=S.scores[key]||[];
if(arr.length===0){summary[u.id]=null;return;}
const best=Math.max(...arr.map(a=>a.score));
const avg=Math.round(arr.reduce((s,a)=>s+a.score,0)/arr.length);
summary[u.id]={best,avg,count:arr.length,bestPct:Math.round(best/20*100)};
});
const farr=S.scores.final||[];
if(farr.length>0){
const best=Math.max(...farr.map(a=>a.score));
summary.final={best,avg:Math.round(farr.reduce((s,a)=>s+a.score,0)/farr.length),count:farr.length,bestPct:Math.round(best/50*100)};
}
return summary;
}

function calcGrade(n,total){
const p=n/total;
if(p>=.9)return{g:'A',m:'Outstanding work.'};if(p>=.8)return{g:'B',m:'Great job.'};
if(p>=.7)return{g:'C',m:'Decent. Review missed topics.'};if(p>=.6)return{g:'D',m:'Needs improvement.'};
return{g:'F',m:'Review the study guide thoroughly.'};
}

h+='</div>';
h+='<div class="diag-instr">Step 1: Click a numbered circle on the diagram (turns orange). Step 2: Click the correct label below. Correct answers turn green.</div>';
h+='<div class="diag-canvas">'+diag.svg+'</div>';
h+='<div class="word-bank-label">Word Bank</div>';
h+='<div class="word-bank">';
diag.parts.forEach((label)=>{
const used=Object.values(d.answers).includes(label);
h+='<button class="wb-btn'+(used?' used':'')+'" data-lbl="'+label+'" '+(used?'disabled':'')+' onclick="selectLabel(\''+label.replace(/'/g,"\\'")+'\')">'+(used?'&#10003; ':'')+label+'</button>';
});
h+='</div>';
h+='<div id="diag-done-msg" style="display:none;text-align:center;padding:12px;color:#3D8C5A;font-weight:600;font-size:15px">All correct! Well done.</div>';
h+='<div class="diag-score"><div><div class="diag-score-n" id="diag-score-val">'+correct+'/'+total+'</div><div class="diag-score-lbl">Labeled correctly</div></div>';
h+='<div style="display:flex;gap:10px">';
if(correct>0)h+='<button class="btn btn-s" style="font-size:13px" onclick="switchDiag(\''+S.diag.which+'\')">Reset</button>';
if(correct===total&&total>0)h+='<span style="color:#3D8C5A;font-weight:600;line-height:1;align-self:center">Perfect &#10003;</span>';
h+='</div></div>';
h+='</div>';
app.innerHTML=h;
}

function renderWriting(){
const app=document.getElementById('app');
const uid=S.writing.uid;
const qs=WQ[uid]||[];
let h=hdr('Writing Practice');
h+='<div class="wr-wrap">';
h+='<button class="sb-back" style="margin-bottom:20px" onclick="goHome()">&#8592; Home</button>';
h+='<div class="wr-hdr"><h2>Writing Practice</h2><p>Write your answer, then reveal the model answer and self-score 0&ndash;3. Try to write as much as you can before revealing.</p></div>';
h+='<div class="wr-unit-sel">';
UNITS.forEach(u=>{h+='<button class="wr-unit-btn'+(uid===u.id?' act':'')+'" onclick="writingSetUnit('+u.id+')">Unit '+u.id+'</button>';});
h+='</div>';
qs.forEach((q,qi)=>{
const key=uid+'-'+qi;
const grade=S.writing.grades[key];
const savedAns=S.writing.answers[key]||'';
const revealed=grade&&grade.revealed;
h+='<div class="wr-q">';
h+='<div class="wr-qnum">Question '+(qi+1)+' of '+qs.length+'</div>';
h+='<div class="wr-qtext">'+q.q+'</div>';
h+='<textarea class="wr-textarea" id="wta-'+key+'" placeholder="Write your answer here..."'+(revealed?' disabled':'')+'>'+savedAns+'</textarea>';
h+='<div class="wr-actions" id="wact-'+key+'">';
if(!revealed){
h+='<button class="btn btn-p" style="font-size:13px;background:#6B4FA0" onclick="revealWritingAnswer('+uid+','+qi+')">Reveal Model Answer</button>';
}else{
h+='<button class="btn btn-s" style="font-size:13px" onclick="resetWritingAnswer('+uid+','+qi+')">Try Again</button>';
}
h+='</div>';
h+='<div id="grade-box-'+key+'">';
if(revealed){h+=buildRevealBox(q.ans,uid,qi,grade.score,'writing');}
h+='</div>';
h+='</div>';
});
h+='</div>';
app.innerHTML=h;
}

function buildGradeBox(grade){
if(!grade||!grade.revealed)return '';
return buildRevealBox('',null,null,grade.score,null);
}

function submitWritingAnswer(uid,qi){revealWritingAnswer(uid,qi);}

function resetWritingAnswer(uid,qi){
const key=uid+'-'+qi;
delete S.writing.answers[key];
delete S.writing.grades[key];
renderWriting();
}

function renderFinalSA(){
const app=document.getElementById('app');
const f=S.final;
let h=hdr('Final Exam &mdash; Written Questions');
h+='<div class="test-wrap">';
h+='<div class="wr-final-sa"><h3>Written Section</h3><p>Write your answer, then reveal the model answer and self-score 0&ndash;3. You must score all 5 to see your final results.</p></div>';
FINAL_SA.forEach((q,i)=>{
const grade=f.saGrades[i];
const saved=f.saAnswers[i]||'';
const revealed=grade&&grade.revealed;
h+='<div class="wr-q">';
h+='<div class="wr-qnum" style="color:#6B4FA0">Written Q'+(i+1)+' &mdash; Unit '+q.unit+': '+UNITS.find(u=>u.id===q.unit)?.title+'</div>';
h+='<div class="wr-qtext">'+q.q+'</div>';
h+='<textarea class="wr-textarea" id="fsa-'+i+'" placeholder="Write your answer here..."'+(revealed?' disabled':'')+'>'+saved+'</textarea>';
h+='<div class="wr-actions" id="fsa-act-'+i+'">';
if(!revealed){h+='<button class="btn btn-p" style="font-size:13px;background:#6B4FA0" onclick="revealFinalSA('+i+')">Reveal Model Answer</button>';}
h+='</div>';
h+='<div id="fsa-grade-'+i+'">'+(revealed?buildRevealBox(q.ans,null,i,grade.score,'final'):'')+'</div>';
h+='</div>';
});
const allScored=f.saGrades.every(g=>g&&g.score!==null);
h+='<div style="margin-top:24px;display:flex;gap:12px;justify-content:center">';
h+='<button class="btn btn-p" id="final-sa-continue" '+(allScored?'':'disabled')+' onclick="finalizeFinalSA()" style="background:#6B4FA0">'+(allScored?'View Final Results':'Score all answers to continue')+'</button>';
h+='</div></div>';
app.innerHTML=h;
}

function submitFinalSA(i){revealFinalSA(i);}

function finalizeFinalSA(){
S.final.done=true;
if(!S.scores.final)S.scores.final=[];
let mcScore=0;FINAL.forEach((q,i)=>{if(S.final.ans[i]===q.ans)mcScore++;});
let saScore=0;S.final.saGrades.forEach(g=>{if(g&&g.score!=null)saScore+=g.score;});
S.scores.final.push({score:mcScore,saScore,total:50,saTotal:15,ts:Date.now()});
saveScores();
renderFinalResults();
}
render();
</script>
</body>
</html>
